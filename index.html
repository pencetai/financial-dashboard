<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>金融仪表台</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="主导航">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">F</div>
          <div>
            <strong>金融仪表台</strong>
            <span>测试版</span>
          </div>
        </div>

        <nav class="nav-list">
          <a href="#monitor" class="nav-item active" data-section="monitor">
            <span class="nav-icon" aria-hidden="true">⌁</span>
            基础监控
          </a>
          <a href="#watch" class="nav-item" data-section="watch">
            <span class="nav-icon" aria-hidden="true">◆</span>
            关注
          </a>
          <a href="#strategy" class="nav-item" data-section="strategy">
            <span class="nav-icon" aria-hidden="true">◇</span>
            选股
          </a>
        </nav>

        <div class="sidebar-note">
          <span>数据源</span>
          <strong>模拟行情</strong>
          <small>后续可接入 A 股、美股、港股、基金、加密资产等。</small>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="pageEyebrow">多市场实时工作台</p>
            <h1 id="pageTitle">全球金融监控</h1>
          </div>
          <div class="topbar-actions">
            <div class="segmented" role="group" aria-label="市场范围">
              <button class="segment active" data-market="all">全部</button>
              <button class="segment" data-market="cn">A 股</button>
              <button class="segment" data-market="us">美股</button>
            </div>
            <button class="icon-button" id="refreshButton" aria-label="刷新数据" title="刷新数据">
              <span aria-hidden="true">↻</span>
            </button>
          </div>
        </header>

        <section class="status-strip view-section active-section" data-view="monitor" aria-label="市场概览">
          <article>
            <span>上证指数</span>
            <strong id="shIndex">3,182.44</strong>
            <em class="up">+0.46%</em>
          </article>
          <article>
            <span>纳斯达克</span>
            <strong id="nasdaqIndex">18,712.08</strong>
            <em class="down">-0.18%</em>
          </article>
          <article>
            <span>黄金</span>
            <strong id="goldIndex">2,354.20</strong>
            <em class="up">+0.31%</em>
          </article>
          <article>
            <span>美元指数</span>
            <strong id="dxyIndex">104.28</strong>
            <em class="down">-0.09%</em>
          </article>
        </section>

        <div class="workspace">
          <section class="panel market-panel view-section active-section" id="monitor" data-view="monitor">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">5 秒刷新</p>
                <h2>基础监控</h2>
              </div>
              <span class="live-pill"><span></span> 实时模拟</span>
            </div>

            <div class="market-grid" id="marketRows" aria-label="行情监控"></div>
          </section>

          <section class="panel news-panel view-section" id="watch" data-view="watch">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">热搜榜式排序</p>
                <h2>关注</h2>
              </div>
              <button class="ghost-button" id="addWatchButton">添加自选</button>
            </div>

            <div class="search-box">
              <label for="watchSearch">联网搜索</label>
              <div class="search-row">
                <input id="watchSearch" type="search" placeholder="输入个股名称或代码，搜索近 7 日新闻" />
                <button class="primary-button search-button" id="watchSearchButton">搜索分析</button>
              </div>
              <span class="search-status" id="watchSearchStatus">测试版使用模拟联网结果，后续接入 Codex 搜索与分析。</span>
            </div>

            <div class="watch-board">
              <div class="watch-card-grid" id="watchCards" aria-label="关注卡片"></div>
              <div class="news-list" id="newsList"></div>
            </div>
          </section>

          <section class="panel strategy-panel view-section" id="strategy" data-view="strategy">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">自然语言策略</p>
                <h2>选股</h2>
              </div>
              <span class="stage-pill">回测预留</span>
            </div>

            <div class="strategy-card-grid" id="strategyCards" aria-label="策略卡片"></div>
            <div class="strategy-output" id="strategyOutput"></div>
          </section>
        </div>
      </main>
    </div>

    <nav class="mobile-nav" aria-label="移动端导航">
      <a href="#monitor" class="mobile-nav-item active" data-section="monitor">监控</a>
      <a href="#watch" class="mobile-nav-item" data-section="watch">关注</a>
      <a href="#strategy" class="mobile-nav-item" data-section="strategy">选股</a>
    </nav>

    <script src="app.js"></script>
  </body>
</html>
